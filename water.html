<style>
  :root {
    --bg: #f4f1ea;
    --ink: #2f3537;
  }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }
  #stage {
    position: fixed;
    inset: 0;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    -webkit-touch-callout: none;

  }

    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .navlink {
    position: absolute;
    border-radius: 10px;
    cursor: pointer;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
  }
  .navlink:focus-visible {
    outline: 2px solid var(--ink);
    outline-offset: 2px;
  }
  #status {
    position: fixed;
    left: clamp(18px, 3.2vw, 46px);
    bottom: clamp(16px, 4.8vh, 44px);
    font: 500 10px/1 system-ui, -apple-system, sans-serif;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    --sc: rgba(47, 53, 55, 0.55);
    --sc-full: #2f3537;
    color: var(--sc);
    white-space: nowrap;
    -webkit-user-select: none;
    user-select: none;
  }
  #status.light {
    --sc: rgba(244, 241, 234, 0.62);
    --sc-full: #f4f1ea;
  }

    #status { font-size: 8px; letter-spacing: 0.16em; left: 14px; bottom: 14px; }
  }
  #status button {
    all: unset;
    cursor: pointer;
    font: inherit;
    letter-spacing: inherit;
    color: inherit;
    /* invisible padding grows the tap target without moving the text */
    padding: 17px 10px;
    margin: -17px -10px;
    -webkit-tap-highlight-color: transparent;
  }
  #status button:hover { color: var(--sc-full); }
  @keyframes scene-pulse {
    0%, 100% { color: var(--sc); }
    50% { color: var(--sc-full); }

  #status button.pulse { animation: scene-pulse 2.6s ease-in-out infinite; }
  #status button:focus-visible {
    color: var(--sc-full);
    outline: 2px solid currentColor;
    outline-offset: -12px;
    border-radius: 8px;
  }
  #note {
    position: fixed;
    left: 50%;
    bottom: 20px;
    transform: translateX(-50%);
    font: 500 12px/1.4 system-ui, -apple-system, sans-serif;
    color: var(--ink);
    background: rgba(244, 241, 234, 0.78);
    border: 1px solid rgba(47, 53, 55, 0.18);
    padding: 7px 14px;
    border-radius: 999px;
    backdrop-filter: blur(6px);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
    white-space: nowrap;
  }
  #note.show { opacity: 1; }
  #toast {
    position: fixed;
    left: 50%;
    bottom: 56px;
    transform: translate(-50%, 8px);
    font: 600 13px/1.4 system-ui, -apple-system, sans-serif;
    color: #f4f1ea;
    background: var(--ink);
    padding: 10px 18px;
    border-radius: 999px;
    opacity: 0;
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }
</style>

function pickArt(cssW, cssH) {
  const target = Math.log(cssW / cssH);
  let best = ART[0], bestD = Infinity;
  for (const a of ART) {
    const d = Math.abs(target - Math.log(a.w / a.h));
    if (d < bestD) { bestD = d; best = a; }
  }
  return best;
}

// ---------- logo + nav lifted off the flat artwork into overlay layers ----------
// The text is two flat tones on a flat ground, so alpha falls out of luminance.
function extractOverlays(art) {
  const pad = 6;
  const x0 = Math.max(0, art.logo.x0 - pad);
  const x1 = Math.min(art.w - 1, art.logo.x1 + pad);
  const y0 = Math.max(0, art.logo.y0 - pad);
  const y1 = Math.min(art.h - 1, art.logo.y1 + pad);
  const w = x1 - x0 + 1, h = y1 - y0 + 1;

  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  const cx = c.getContext('2d', { willReadFrequently: true });
  cx.drawImage(art.img, x0, y0, w, h, 0, 0, w, h);
  const src = cx.getImageData(0, 0, w, h).data;

  const bgL = 240, inkL = 52; // measured from the exports
  const dark = new ImageData(w, h);
  const light = new ImageData(w, h);
  const accent = new ImageData(w, h);
  for (let i = 0; i < src.length; i += 4) {
    const l = 0.299 * src[i] + 0.587 * src[i + 1] + 0.114 * src[i + 2];
    let a = (bgL - l) / (bgL - inkL);
    a = a < 0 ? 0 : a > 1 ? 1 : a;
    const A = Math.round(a * 255);
    dark.data[i] = 47;  dark.data[i + 1] = 53;  dark.data[i + 2] = 55;  dark.data[i + 3] = A;
    light.data[i] = 244; light.data[i + 1] = 241; light.data[i + 2] = 234; light.data[i + 3] = A;
    accent.data[i] = 192; accent.data[i + 1] = 86; accent.data[i + 2] = 47; accent.data[i + 3] = A;
  }
  const mk = (id) => {
    const oc = document.createElement('canvas');
    oc.width = w; oc.height = h;
    oc.getContext('2d').putImageData(id, 0, 0);
    return oc;
  };
  art.overlay = { x0, y0, w, h, dark: mk(dark), light: mk(light), accent: mk(accent) };
}

  // average luminance of a css-space region of the page canvas

  const d = tc.getImageData(0, 0, 8, 8).data;
  let sum = 0;
  for (let i = 0; i < d.length; i += 4) sum += 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
  return sum / 64;
}

function drawNav(ctx, M, scale, ox, oy, light) {
  const wd0 = M.words[0];
  const yMid = oy + (wd0.y0 + wd0.y1) / 2 * scale;
  const capPx = (wd0.y1 - wd0.y0) * scale;
  const fs = capPx / 0.72;
  ctx.font = '600 ' + fs + 'px "Helvetica Neue", Helvetica, Arial, sans-serif';
  try { ctx.letterSpacing = (fs * 0.13).toFixed(2) + 'px'; } catch (e) {}
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  const ws = NAV.map(tx => ctx.measureText(tx).width);
  const total = ws.reduce((a, b) => a + b, 0);
  const gap = fs * 1.4;
  const blockW = total + gap * (NAV.length - 1);
  let x = (2 * ox + M.w * scale) / 2 - blockW / 2;
  navRects = [];
  NAV.forEach((tx, i) => {
    const isH = i === hoveredNav;
    ctx.fillStyle = isH ? ACCENT : (light ? BG : INK);
    ctx.fillText(tx, x, yMid);
    if (isH) ctx.fillRect(x, yMid + capPx, ws[i], 3);
    const padX = Math.max(16, (48 - ws[i]) / 2), padY = Math.max(16, (48 - capPx) / 2);
    navRects.push({ x: x - padX, y: yMid - capPx / 2 - padY, w: ws[i] + padX * 2, h: capPx + padY * 2 });
    x += ws[i] + gap;
  });
  try { ctx.letterSpacing = '0px'; } catch (e) {}
  return { yMid, capPx };
}

function drawCaption(ctx, M, scale, oy, cssW, cap, light) {
  if (!cap || !cap.t) return;
  const wd0 = M.words[0];
  const capPx = (wd0.y1 - wd0.y0) * scale;
  const yMid = oy + (wd0.y0 + wd0.y1) / 2 * scale;
  const y = yMid + capPx * 2.5;
  const fs = capPx * 0.62;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = light ? BG : INK;
  ctx.font = '600 ' + fs + 'px "Helvetica Neue", Helvetica, Arial, sans-serif';
  try { ctx.letterSpacing = (fs * 0.05).toFixed(2) + 'px'; } catch (e) {}
  ctx.fillText(cap.t, cssW / 2, y);
  ctx.fillStyle = ACCENT;
  ctx.font = '600 ' + (fs * 0.58) + 'px "SF Mono", Menlo, monospace';
  try { ctx.letterSpacing = (fs * 0.22).toFixed(2) + 'px'; } catch (e) {}
  ctx.fillText(cap.c, cssW / 2, y + fs * 1.55);
  try { ctx.letterSpacing = '0px'; } catch (e) {}
  ctx.textAlign = 'left';
}

function paintScene(idx, cssW, cssH, dpr) {
  pageCanvas.width  = Math.round(cssW * dpr);
  pageCanvas.height = Math.round(cssH * dpr);
  const ctx = pctx;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, cssW, cssH);

  const M = pickArt(cssW, cssH);
  const { scale, ox, oy } = layoutTransform(M, cssW, cssH);

  if (idx === 0) {
    ctx.drawImage(M.img, ox, oy, M.w * scale, M.h * scale);
    const sx0 = Math.min(...M.words.map(w => w.x0)), sx1 = Math.max(...M.words.map(w => w.x1));
    const sy0 = M.words[0].y0, sy1 = M.words[0].y1;
    ctx.fillStyle = BG;
    ctx.fillRect(ox + (sx0 - 40) * scale, oy + (sy0 - 20) * scale,
                 (sx1 - sx0 + 80) * scale, (sy1 - sy0 + 40) * scale);
    drawNav(ctx, M, scale, ox, oy, false);
    statusLight = false;
  } else {
    const g = GALLERY[idx - 1];
    const ps = Math.max(cssW / g.img.naturalWidth, cssH / g.img.naturalHeight);
    ctx.drawImage(g.img,
      (cssW - g.img.naturalWidth * ps) / 2, (cssH - g.img.naturalHeight * ps) / 2,
      g.img.naturalWidth * ps, g.img.naturalHeight * ps);
    const ov = M.overlay;
    const ovx = ox + ov.x0 * scale, ovy = oy + ov.y0 * scale, ovw = ov.w * scale, ovh = ov.h * scale;
    const logoLum = sampleLum(ctx, ovx, ovy, ovw, ovh, dpr);
    ctx.drawImage(logoLum < 140 ? ov.light : ov.dark, 0, 0, ov.w, ov.h, ovx, ovy, ovw, ovh);
    const wd0 = M.words[0];
    const nyMid = oy + (wd0.y0 + wd0.y1) / 2 * scale;
    const navLum = sampleLum(ctx, cssW * 0.2, nyMid - 22, cssW * 0.6, 44, dpr);
    drawNav(ctx, M, scale, ox, oy, navLum < 140);
    drawCaption(ctx, M, scale, oy, cssW, g, navLum < 140);
    statusLight = sampleLum(ctx, 8, cssH - 60, Math.min(360, cssW * 0.45), 52, dpr) < 140;
  }
}

// ---------- real, invisible links over the painted nav ----------
const navEls = NAV.map((item, i) => {
  const a = document.createElement('a');
  a.href = (item === 'CONNECT') ? 'mailto:hello@wearenormal.ai' : '#' + item.toLowerCase();
  a.className = 'navlink';
  a.setAttribute('aria-label', item);
  a.addEventListener('mouseenter', () => setHover(i));
  a.addEventListener('mouseleave', () => setHover(-1));
  a.addEventListener('focus', () => setHover(i));
  a.addEventListener('blur', () => setHover(-1));
  a.addEventListener('click', (e) => {
    const r = navRects[i];
    const cx = r ? r.x + r.w / 2 : cssW / 2, cy = r ? r.y + r.h / 2 : cssH / 2;
    if (r) drops.push({ x: cx, y: cy, radius: 34, strength: -0.5 });
    if (item === 'CONNECT') return;
    e.preventDefault();
    if (item === 'MEET') diveTo(GALLERY.length, cx, cy);
    else advance(cx, cy);
  });
  stage.appendChild(a);
  return a;
});

function positionNavLinks() {
  navRects.forEach((r, i) => {
    const s = navEls[i].style;
    s.left = r.x + 'px';
    s.top = r.y + 'px';
    s.width = r.w + 'px';
    s.height = r.h + 'px';
  });
}

function setHover(i) {
  if (hoveredNav === i) return;

  45: 'fog, moody', 48: 'fog, moody',
  51: 'damp', 53: 'damp', 55: 'properly damp',

function wxPhrase(code, tempC) {

function clockText() {

}

function sceneLabel() {
  const shown = fadeTo >= 0 ? fadeTo : scene;

function renderStatus() {
  statusEl.textContent = '';

  statusEl.append(parts.join(' — ') + (GALLERY.length ? ' — ' : ''));

  setInterval(() => {

// live data — degrades silently where the network is walled off (e.g. artifact hosting)
(async () => {
  const opts = ('timeout' in AbortSignal) ? { signal: AbortSignal.timeout(7000) } : {};
  try {
    const ip = await (await fetch('https://ipapi.co/json/', opts)).json();
    if (ip && ip.city) {

      if (wx && wx.current_weather) {

})();

// ---------- WebGL ----------
const VERT = `
attribute vec2 aPos;
varying vec2 vUV;
void main() {
  vUV = aPos * 0.5 + 0.5;
  gl_Position = vec4(aPos, 0.0, 1.0);
}`;

const PRECISION = `
#ifdef GL_FRAGMENT_PRECISION_HIGH
precision highp float;
#else
precision mediump float;
#endif`;

const UPDATE_FRAG = PRECISION + `
varying vec2 vUV;
uniform sampler2D uPrev;
uniform vec2 uTexel;
uniform vec2 uAspect;
uniform float uStiffness;
uniform float uDampVel;
uniform float uDampH;
uniform int uDropCount;
uniform vec4 uDrops[${MAX_DROPS}];

void main() {
  vec4 c = texture2D(uPrev, vUV);
  float h = c.r;
  float v = c.g;
  float sum =
    texture2D(uPrev, vUV - vec2(uTexel.x, 0.0)).r +
    texture2D(uPrev, vUV + vec2(uTexel.x, 0.0)).r +
    texture2D(uPrev, vUV - vec2(0.0, uTexel.y)).r +
    texture2D(uPrev, vUV + vec2(0.0, uTexel.y)).r;
  v += (sum * 0.25 - h) * uStiffness;
  v *= uDampVel;
  h += v;
  h *= uDampH;

  for (int i = 0; i < ${MAX_DROPS}; i++) {
    if (i >= uDropCount) break;
    vec4 d = uDrops[i];
    float dist = length((vUV - d.xy) * uAspect);
    float t = clamp(dist / d.z, 0.0, 1.0);
    h += d.w * (0.5 + 0.5 * cos(t * 3.14159265));
  }
  gl_FragColor = vec4(h, v, 0.0, 1.0);
}`;

const RENDER_FRAG = PRECISION + `
varying vec2 vUV;
uniform sampler2D uSim;
uniform sampler2D uPage;
uniform sampler2D uPageB;
uniform float uFade;
uniform float uDepth;
uniform float uUseReveal;
uniform float uRevealR;
uniform vec2 uRevealC;
uniform vec2 uAspectR;
uniform vec2 uTorch;
uniform float uTorchAmt;
uniform vec2 uTexel;
uniform float uRefract;
uniform float uSlope;
uniform float uShade;
uniform float uSpec;
uniform vec3 uSpecColor;

void main() {
  float hl = texture2D(uSim, vUV - vec2(uTexel.x, 0.0)).r;
  float hr = texture2D(uSim, vUV + vec2(uTexel.x, 0.0)).r;
  float hd = texture2D(uSim, vUV - vec2(0.0, uTexel.y)).r;
  float hu = texture2D(uSim, vUV + vec2(0.0, uTexel.y)).r;
  vec2 grad = vec2(hr - hl, hu - hd);

  float h0 = texture2D(uSim, vUV).r;
  vec2 uv = vUV + grad * (uRefract * (1.0 + uDepth * 1.4));
  float mask;
  if (uUseReveal > 0.5) {
    float d = length((vUV - uRevealC) * uAspectR) + h0 * 0.7;
    mask = 1.0 - smoothstep(uRevealR - 0.12, uRevealR + 0.02, d);
  } else { mask = uFade; }
  vec3 page = mix(texture2D(uPage, uv).rgb, texture2D(uPageB, uv).rgb, mask);
  if (uDepth > 0.02) {
    float b = 0.0016 + uDepth * 0.004;
    vec3 blur = page
      + mix(texture2D(uPage, uv+vec2(b,0.0)).rgb, texture2D(uPageB, uv+vec2(b,0.0)).rgb, mask)
      + mix(texture2D(uPage, uv-vec2(b,0.0)).rgb, texture2D(uPageB, uv-vec2(b,0.0)).rgb, mask)
      + mix(texture2D(uPage, uv+vec2(0.0,b)).rgb, texture2D(uPageB, uv+vec2(0.0,b)).rgb, mask)
      + mix(texture2D(uPage, uv-vec2(0.0,b)).rgb, texture2D(uPageB, uv-vec2(0.0,b)).rgb, mask);
    page = mix(page, blur * 0.2, uDepth * 0.7);
    page = mix(page, vec3(0.06, 0.11, 0.13), uDepth * 0.42);
  }

  vec3 n = normalize(vec3(-grad * uSlope, 1.0));
  vec3 V = vec3(0.0, 0.0, 1.0);
  vec3 L1 = normalize(vec3(-0.35, 0.55, 0.80));
  vec3 L2 = normalize(vec3(0.60, -0.42, 0.68));
  float slope = length(grad);
  float shade = (grad.x + grad.y) * uShade;

  // hard silver chrome speculars — tight, blown highlights riding the ripple crests
  float chrome = pow(max(dot(reflect(-L1, n), V), 0.0), 220.0) * 1.5
               + pow(max(dot(reflect(-L2, n), V), 0.0), 120.0) * 0.8;
  chrome *= uSpec * 2.4;
  float fres = pow(1.0 - max(n.z, 0.0), 3.0);   // fresnel rim on the steep peaks

  // oil-slick iridescence — kept mostly silver, rainbow only where the liquid is steep
  float hueV = h0 * 7.0 + slope * 26.0 + 0.15;
  vec3 iri = 0.5 + 0.5 * cos(6.2831853 * (hueV + vec3(0.0, 0.33, 0.67)));
  vec3 sheenCol = mix(vec3(1.0), iri, clamp(slope * uSlope * 1.3, 0.0, 0.65));

  // --- aperture: where the opaque black liquid PARTS to show the film beneath ---
  float td = length((vUV - uTorch) * uAspectR);
  float aperture = smoothstep(0.42, 0.03, td) * clamp(uTorchAmt * 1.7, 0.0, 1.0);
  float dive = 0.0;
  if (uUseReveal > 0.5) {
    float dR = length((vUV - uRevealC) * uAspectR) + h0 * 0.7;
    dive = 1.0 - smoothstep(uRevealR - 0.10, uRevealR + 0.02, dR);
  }
  float open = clamp(max(aperture, dive), 0.0, 1.0);

  // opaque black ferrofluid body — the film is only faintly embossed in the metal
  vec3 ferro = page * 0.055 + vec3(0.008, 0.011, 0.017);
  ferro *= (1.0 + shade * 0.8);
  ferro += sheenCol * (chrome + fres * 0.28);
  ferro += iri * fres * 0.16;

  // revealed film inside the opening — bright, keeps a light chrome glint
  vec3 reveal = page * (1.0 + shade * 0.4);
  reveal += sheenCol * chrome * 0.5;

  vec3 col = mix(ferro, reveal, open);

  // bright molten chrome rim where the metal splits around the opening
  float rim = smoothstep(0.16, 0.0, abs(open - 0.5));
  col += sheenCol * rim * (0.35 + chrome * 0.8);
  gl_FragColor = vec4(col, 1.0);
}`;

function compile(gl, type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    throw new Error(gl.getShaderInfoLog(s));
  }
  return s;
}
function program(gl, fragSrc) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl, gl.VERTEX_SHADER, VERT));
  gl.attachShader(p, compile(gl, gl.FRAGMENT_SHADER, fragSrc));
  gl.bindAttribLocation(p, 0, 'aPos');
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    throw new Error(gl.getProgramInfoLog(p));
  }
  return p;
}

let gl = null, halfType = 0, internalFmt = 0, simLinear = true;

function initContext() {
  const opts = { alpha: false, antialias: false, depth: false, stencil: false };
  const gl2 = canvas.getContext('webgl2', opts);
  if (gl2) {
    const extF  = gl2.getExtension('EXT_color_buffer_float');
    const extHF = gl2.getExtension('EXT_color_buffer_half_float');
    if (extF || extHF) {
      gl = gl2;
      halfType = gl2.HALF_FLOAT;
      internalFmt = gl2.RGBA16F;
      return true;
    }
  }
  const gl1 = canvas.getContext('webgl', opts) ||
              canvas.getContext('experimental-webgl', opts);
  if (!gl1) return false;
  const hf = gl1.getExtension('OES_texture_half_float');
  if (!hf) return false;
  simLinear = !!gl1.getExtension('OES_texture_half_float_linear');
  gl = gl1;
  halfType = hf.HALF_FLOAT_OES;
  internalFmt = gl1.RGBA;
  return true;
}

function makeSimTexture(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  const filter = simLinear ? gl.LINEAR : gl.NEAREST;
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, filter);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  gl.texImage2D(gl.TEXTURE_2D, 0, internalFmt, w, h, 0, gl.RGBA, halfType, null);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  const ok = gl.checkFramebufferStatus(gl.FRAMEBUFFER) === gl.FRAMEBUFFER_COMPLETE;
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return ok ? { tex, fbo } : null;
}

// ---------- app state ----------
let simA = null, simB = null, simW = 0, simH = 0;
let pageTexA = null, pageTexB = null;
let updateProg = null, renderProg = null, uniforms = {};
let cssW = 0, cssH = 0, dpr = 1;
let drops = [];
let lastInteraction = 0;
let running = false;

// scenes: 0 = plain page, 1..N = gallery
let scene = 0;
let fadeTo = -1;
let fadeStart = 0;
const DIVE_MS = 1500;
let depth = 0.7, bootRise = true;            // surface up from the deep on load
let useReveal = 0, revealR = 0, revealC = { x: 0.5, y: 0.5 };
let torch = { x: 0.5, y: 0.5 }, torchAmt = 0;
function diveTo(idx, px, py) {
  if (!running || fadeTo >= 0 || idx === scene) return;
  fadeTo = idx;
  paintScene(fadeTo, cssW, cssH, dpr);
  positionNavLinks();
  uploadPage(pageTexB);
  fadeStart = performance.now();
  revealC = { x: (px !== undefined ? px : cssW / 2) / cssW, y: 1 - ((py !== undefined ? py : cssH / 2) / cssH) };
  if (px !== undefined) { addDrop(px, py, 52, -0.6); addDrop(px, py, 22, -0.4); }
  renderStatus();
}

function getUniforms() {
  const u = (p, n) => gl.getUniformLocation(p, n);
  uniforms = {
    upPrev: u(updateProg, 'uPrev'),
    upTexel: u(updateProg, 'uTexel'),
    upAspect: u(updateProg, 'uAspect'),
    upStiff: u(updateProg, 'uStiffness'),
    upDampV: u(updateProg, 'uDampVel'),
    upDampH: u(updateProg, 'uDampH'),
    upCount: u(updateProg, 'uDropCount'),
    upDrops: u(updateProg, 'uDrops[0]'),
    rSim: u(renderProg, 'uSim'),
    rPage: u(renderProg, 'uPage'),
    rPageB: u(renderProg, 'uPageB'),
    rFade: u(renderProg, 'uFade'),
    rDepth: u(renderProg, 'uDepth'),
    rUseReveal: u(renderProg, 'uUseReveal'),
    rRevealR: u(renderProg, 'uRevealR'),
    rRevealC: u(renderProg, 'uRevealC'),
    rAspectR: u(renderProg, 'uAspectR'),
    rTorch: u(renderProg, 'uTorch'),
    rTorchAmt: u(renderProg, 'uTorchAmt'),
    rTexel: u(renderProg, 'uTexel'),
    rRefract: u(renderProg, 'uRefract'),
    rSlope: u(renderProg, 'uSlope'),
    rShade: u(renderProg, 'uShade'),
    rSpec: u(renderProg, 'uSpec'),
    rSpecColor: u(renderProg, 'uSpecColor')
  };
}

function makePageTexture() {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return tex;
}

function uploadPage(tex) {
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, true);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, pageCanvas);
  gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL, false);
}

function repaintCurrent() {
  paintScene(scene, cssW, cssH, dpr);
  positionNavLinks();
  uploadPage(pageTexA);
  renderStatus();
}

function advance(px, py) {
  if (!GALLERY.length || !running) return;
  if (fadeTo >= 0) {
    // fade already running: finish it instantly, then move on
    scene = fadeTo;
    fadeTo = -1;
    const t = pageTexA; pageTexA = pageTexB; pageTexB = t;
  }
  fadeTo = (scene + 1) % (GALLERY.length + 1);
  paintScene(fadeTo, cssW, cssH, dpr);
  positionNavLinks();
  uploadPage(pageTexB);
  fadeStart = performance.now();
  revealC = { x: (px !== undefined ? px : cssW / 2) / cssW, y: 1 - ((py !== undefined ? py : cssH / 2) / cssH) };
  if (px !== undefined) { addDrop(px, py, 52, -0.6); addDrop(px, py, 22, -0.4); }
  renderStatus();
}

function resize() {
  cssW = stage.clientWidth;
  cssH = stage.clientHeight;
  dpr = Math.min(DPR_CAP, window.devicePixelRatio || 1);
  canvas.width  = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);

  const scale = Math.min(0.5, 512 / Math.max(cssW, cssH));
  simW = Math.max(64, Math.round(cssW * scale));
  simH = Math.max(64, Math.round(cssH * scale));
  simA = makeSimTexture(simW, simH);
  simB = makeSimTexture(simW, simH);
  if (!simA || !simB) { fail(); return false; }
  if (fadeTo >= 0) { scene = fadeTo; fadeTo = -1; }
  repaintCurrent();
  return true;
}

function stepSim(frameDrops) {
  gl.useProgram(updateProg);
  gl.viewport(0, 0, simW, simH);
  gl.uniform2f(uniforms.upTexel, 1 / simW, 1 / simH);
  gl.uniform2f(uniforms.upAspect, cssW / cssH, 1);
  gl.uniform1f(uniforms.upStiff, W.stiffness);
  gl.uniform1f(uniforms.upDampV, W.dampVel);
  gl.uniform1f(uniforms.upDampH, W.dampH);

  for (let s = 0; s < W.steps; s++) {
    const d = s === 0 ? frameDrops : [];
    const arr = new Float32Array(MAX_DROPS * 4);
    for (let i = 0; i < d.length; i++) {
      arr[i * 4]     = d[i].x / cssW;
      arr[i * 4 + 1] = 1 - d[i].y / cssH;
      arr[i * 4 + 2] = Math.max(0.004, d[i].radius / cssH);
      arr[i * 4 + 3] = d[i].strength;
    }
    gl.uniform1i(uniforms.upCount, d.length);
    gl.uniform4fv(uniforms.upDrops, arr);

    gl.bindFramebuffer(gl.FRAMEBUFFER, simB.fbo);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, simA.tex);
    gl.uniform1i(uniforms.upPrev, 0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    const t = simA; simA = simB; simB = t;
  }
}

function render(fade) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(renderProg);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, simA.tex);
  gl.uniform1i(uniforms.rSim, 0);
  gl.activeTexture(gl.TEXTURE1);
  gl.bindTexture(gl.TEXTURE_2D, pageTexA);
  gl.uniform1i(uniforms.rPage, 1);
  gl.activeTexture(gl.TEXTURE2);
  gl.bindTexture(gl.TEXTURE_2D, pageTexB);
  gl.uniform1i(uniforms.rPageB, 2);
  gl.uniform1f(uniforms.rFade, fade);
  gl.uniform1f(uniforms.rDepth, depth);
  gl.uniform1f(uniforms.rUseReveal, useReveal);
  gl.uniform1f(uniforms.rRevealR, revealR);
  gl.uniform2f(uniforms.rRevealC, revealC.x, revealC.y);
  gl.uniform2f(uniforms.rAspectR, cssW / cssH, 1.0);
  gl.uniform2f(uniforms.rTorch, torch.x, torch.y);
  gl.uniform1f(uniforms.rTorchAmt, torchAmt);
  gl.uniform2f(uniforms.rTexel, 1 / simW, 1 / simH);
  gl.uniform1f(uniforms.rRefract, W.refract);
  gl.uniform1f(uniforms.rSlope, W.slope);
  gl.uniform1f(uniforms.rShade, W.shade);
  gl.uniform1f(uniforms.rSpec, W.spec);
  gl.uniform3f(uniforms.rSpecColor, 1.0, 1.0, 0.97);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function frame() {
  if (!running) return;
  const d = drops.length > MAX_DROPS ? drops.slice(-MAX_DROPS) : drops;
  drops = [];
  stepSim(d);

  torchAmt += (0.6 - torchAmt) * 0.05;
  let fade = 0;
  if (fadeTo >= 0) {
    const p = Math.min(1, (performance.now() - fadeStart) / DIVE_MS);
    if (reduceMotion) { fade = p; useReveal = 0; depth = 0; }
    else {
      const e = 1 - Math.pow(1 - p, 3);
      const ax = cssW / cssH, cx = revealC.x * ax, cy = revealC.y;
      let m = 0;
      m = Math.max(m, Math.hypot(0 - cx, 0 - cy), Math.hypot(ax - cx, 0 - cy));
      m = Math.max(m, Math.hypot(0 - cx, 1 - cy), Math.hypot(ax - cx, 1 - cy));
      revealR = e * (m + 0.3);
      useReveal = 1;
      depth = 0.32 * Math.sin(Math.PI * p);   // just a gentle dip, not a sink
    }
    if (p >= 1) {
      scene = fadeTo; fadeTo = -1;
      const tt = pageTexA; pageTexA = pageTexB; pageTexB = tt;
      fade = 0; useReveal = 0; revealR = 0; depth = 0; bootRise = false;
      renderStatus();
    }
  } else if (bootRise) {
    useReveal = 0;
    depth += (0 - depth) * 0.035;
    if (depth < 0.01) { depth = 0; bootRise = false; }
  } else { useReveal = 0; depth = 0; }
  render(fade);
  requestAnimationFrame(frame);
}

// ---------- input ----------
const pointers = new Map();
let press = null; // pending long-press / click candidate

function addDrop(x, y, radius, strength) {
  drops.push({ x, y, radius, strength });
  lastInteraction = performance.now();
}

stage.addEventListener('pointerdown', (e) => {
  pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
  torch.x = e.clientX / cssW; torch.y = 1 - e.clientY / cssH;
  addDrop(e.clientX, e.clientY, W.tapRadius, W.tapStrength);

  if (e.target.closest('a')) return;
  if (press) { clearTimeout(press.timer); press = null; return; } // second finger cancels
  const p = { id: e.pointerId, x: e.clientX, y: e.clientY, t: performance.now(), fired: false };
  p.timer = setTimeout(() => {
    p.fired = true;
    advance(p.x, p.y); // press-and-hold: next scene
  }, W.longPressMs);
  press = p;
});

stage.addEventListener('pointermove', (e) => {
  const prev = pointers.get(e.pointerId);
  const x = e.clientX, y = e.clientY;
  torch.x = x / cssW; torch.y = 1 - y / cssH;
  if (press && press.id === e.pointerId &&
      Math.hypot(x - press.x, y - press.y) > 12) {
    clearTimeout(press.timer);
    press = null;
  }
  if (prev) {
    const dx = x - prev.x, dy = y - prev.y;
    const dist = Math.hypot(dx, dy);
    const steps = Math.min(8, Math.max(1, Math.floor(dist / 7)));
    const strength = -(0.025 + Math.min(dist * 0.0035, 0.12));
    for (let i = 1; i <= steps; i++) {
      addDrop(prev.x + dx * i / steps, prev.y + dy * i / steps, W.moveRadius, strength / Math.sqrt(steps));
    }
  } else {
    addDrop(x, y, W.moveRadius, -0.03);
  }
  pointers.set(e.pointerId, { x, y });
});

function endPress(e, allowClick) {
  if (!press || press.id !== e.pointerId) return;
  clearTimeout(press.timer);
  const held = performance.now() - press.t;
  const moved = Math.hypot(e.clientX - press.x, e.clientY - press.y);
  // desktop: a plain quick click on the background advances the scene
  if (allowClick && !press.fired && e.pointerType === 'mouse' && held < 400 && moved < 6) {
    advance(e.clientX, e.clientY);
  }
  press = null;
}

stage.addEventListener('pointerup', (e) => {
  endPress(e, true);
  if (e.pointerType !== 'mouse') pointers.delete(e.pointerId);
});
stage.addEventListener('pointercancel', (e) => {
  endPress(e, false);
  pointers.delete(e.pointerId);
});
stage.addEventListener('pointerleave', (e) => {
  endPress(e, false);
  pointers.delete(e.pointerId);
});

// stop iOS scroll/zoom on the water — but let taps on the real links become clicks
const blockTouch = (e) => { if (!e.target.closest('a')) e.preventDefault(); };
stage.addEventListener('touchstart', blockTouch, { passive: false });
stage.addEventListener('touchmove',  blockTouch, { passive: false });

// ---------- idle rain ----------
if (!reduceMotion) {
  setInterval(() => {
    if (document.hidden || !running) return;
    if (performance.now() - lastInteraction < 3500) return;
    const x = cssW * (0.1 + Math.random() * 0.8);
    const y = cssH * (0.1 + Math.random() * 0.8);
    drops.push({ x, y, radius: 9 + Math.random() * 8, strength: -0.10 - Math.random() * 0.08 });
  }, W.rainEvery);
}

// ---------- resize ----------
let resizeTimer = 0;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (gl) resize();
    else drawFallback();
  }, 120);
});

// ---------- fallback: flat page, links still live ----------
function drawFallback() {
  cssW = stage.clientWidth;
  cssH = stage.clientHeight;
  dpr = Math.min(DPR_CAP, window.devicePixelRatio || 1);
  paintScene(scene, cssW, cssH, dpr);
  positionNavLinks();
  renderStatus();
}
function fail() {
  running = false;
  canvas.remove();
  pageCanvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;display:block;';
  stage.insertBefore(pageCanvas, stage.firstChild);
  drawFallback();
  note.textContent = 'WebGL isn’t available here, so the water is off — the links still work.';
  note.classList.add('show');
}

canvas.addEventListener('webglcontextlost', (e) => {
  e.preventDefault();
  running = false;
});
canvas.addEventListener('webglcontextrestored', () => location.reload());

// ---------- boot ----------
function loadImage(holder) {
  return new Promise((res, rej) => {
    holder.img = new Image();
    holder.img.onload = () => res();
    holder.img.onerror = () => rej(new Error('image failed to load'));
    holder.img.src = holder.src;
  });
}

async function boot() {
  await Promise.all([...ART, ...GALLERY].map(loadImage));
  ART.forEach(extractOverlays);

  if (!initContext()) { fail(); return; }
  updateProg = program(gl, UPDATE_FRAG);
  renderProg = program(gl, RENDER_FRAG);
  getUniforms();

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);

  pageTexA = makePageTexture();
  pageTexB = makePageTexture();

  if (!resize()) return;
  uploadPage(pageTexB); // keep B valid before the first fade
  running = true;
  requestAnimationFrame(frame);

  note.textContent = GALLERY.length
    ? 'the work is under the water \u2014 click to dive'
    : 'drag anywhere \u2014 the links are real';
  note.classList.add('show');
  setTimeout(() => note.classList.remove('show'), 5000);

  if (!reduceMotion) {
    setTimeout(() => drops.push({ x: cssW * 0.32, y: cssH * 0.40, radius: 26, strength: -0.32 }), 350);
    setTimeout(() => drops.push({ x: cssW * 0.66, y: cssH * 0.55, radius: 22, strength: -0.26 }), 900);
    setTimeout(() => drops.push({ x: cssW * 0.50, y: cssH * 0.35, radius: 18, strength: -0.22 }), 1450);
  }
}

boot().catch((err) => { fail(); console.error(err); });

})();
</script>
